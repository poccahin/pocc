name: 🚀 Promethean Ignition Sequence (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 后台手动一键点火

env:
  DOCKER_ORG: lifeplusplus # 你的 Docker Hub 组织或用户名

jobs:
  # =====================================================================
  # 🛡️ 阶段一：全栈安全审查与代码编译 (The Crucible)
  # =====================================================================
  security_and_build:
    name: Security Audit & Polyglot Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Planetary Repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust Toolchain (L1 & L3)
        uses: dtolnay/rust-toolchain@stable
      
      - name: 🐍 Setup Python 3.10 (L2.5 Tensor Mesh)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚡ Setup Node.js (L7 Koala OS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 7_koala_os_frontend/package-lock.json

      - name: 🔧 Upgrade npm for lockfile compatibility
        run: npm install -g npm@latest

      - name: 🔒 Rust Security Audit
        run: cargo install cargo-audit && cargo audit
        continue-on-error: true # 警告但不中断，视具体严格程度而定

      - name: 🔨 Compile Planetary Rust Workspace (all crates)
        run: cargo build --release

      - name: 🧪 Run Rust Test Suite
        run: cargo test

      - name: 🧠 Verify Cognitive Canxian Consensus (Python)
        run: |
          pip install -r requirements.txt
          python -m compileall .
        working-directory: 2_pocc_collaboration_mesh

      - name: 🌌 Build Koala OS Frontend (React/TS)
        run: |
          npm ci --legacy-peer-deps
          npm run build
        working-directory: 7_koala_os_frontend

  # =====================================================================
  # 🐳 阶段二：镜像矩阵打包与 Docker Hub 全球分发
  # =====================================================================
  docker_publish:
    name: Docker Matrix Deployment
    needs: security_and_build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 编译并推送 Rust 核心工作空间镜像
      - name: 🚀 Push POCC Rust Workspace Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_ORG }}/pocc-runtime:latest,${{ env.DOCKER_ORG }}/pocc-runtime:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_ORG }}/pocc-runtime:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_ORG }}/pocc-runtime:buildcache,mode=max

      # 2. 编译并推送 L2.5 Python 张量风洞
      - name: 🧠 Push Tensor Wind Tunnel Image
        uses: docker/build-push-action@v5
        with:
          context: ./2_pocc_collaboration_mesh
          push: true
          tags: ${{ env.DOCKER_ORG }}/tensor-wind-tunnel:latest,${{ env.DOCKER_ORG }}/tensor-wind-tunnel:${{ github.sha }}

      # 3. 编译并推送 L7 Koala OS 全息控制台
      - name: 🌌 Push Koala OS Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./7_koala_os_frontend
          push: true
          tags: ${{ env.DOCKER_ORG }}/koala-os-frontend:latest,${{ env.DOCKER_ORG }}/koala-os-frontend:${{ github.sha }}

      - name: 🏁 Ignition Sequence Complete
        run: echo "🪐 Planetary Core successfully deployed to Docker Hub."
